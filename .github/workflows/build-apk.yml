name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI (armeabi-v7a, arm64-v8a, or empty for both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 1. 编译前先 clean，彻底干掉旧的、冲突的遗留 APK 缓存
      - name: Build debug APK
        run: |
          chmod +x gradlew
          if [ -n "${{ github.event.inputs.abi }}" ]; then
            ./gradlew clean :app:assembleDebug -PtargetAbi=${{ github.event.inputs.abi }}
          else
            ./gradlew clean :app:assembleDebug
          fi

      # 2. 精准复制：Android 标准的 Debug APK 输出路径就是 app/build/outputs/apk/debug/
      - name: Locate and stage APK
        run: |
          mkdir -p apk-output
          
          # 1. 全局轰炸式搜索所有以 .apk 结尾的文件，不管它在哪个三级、四级子目录下
          echo "==== 正在全局搜索生成的 APK 文件 ===="
          find . -name "*.apk" -type f
          
          # 2. 将找到的所有 APK 统统复制到输出目录
          find . -name "*.apk" -type f -exec cp {} apk-output/ \;
          
          # 3. 检查到底捞到了没有
          if [ -z "$(ls -A apk-output)" ]; then
            echo "❌ 全局都没找到任何 APK 文件，编译可能没真正产出"
            exit 1
          else
            echo "✅ 成功捞到以下 APK："
            ls -l apk-output/
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilitv-native-apk-${{ github.sha }}
          path: apk-output/*.apk
          if-no-files-found: error
