name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI (armeabi-v7a, arm64-v8a, or empty for both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: |
          chmod +x gradlew
          if [ -n "${{ github.event.inputs.abi }}" ]; then
            ./gradlew :app:assembleDebug -PtargetAbi=${{ github.event.inputs.abi }}
          else
            ./gradlew :app:assembleDebug
          fi

      - name: Locate and stage APK
        run: |
          apk=$(find ~/.gradle/bilitv-native-build -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$apk" ]; then
            # fallback: search wider
            apk=$(find /home/runner -name "*.apk" -path "*/outputs/*" 2>/dev/null | head -1)
          fi
          if [ -z "$apk" ]; then
            echo "APK not found after build"
            exit 1
          fi
          mkdir -p apk-output
          cp "$apk" apk-output/
          echo "APK staged: $(ls apk-output/)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilitv-native-apk-${{ github.sha }}
          path: apk-output/*.apk
          if-no-files-found: error
