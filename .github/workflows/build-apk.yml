name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI (armeabi-v7a, arm64-v8a, or empty for both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 编译前先 clean，确保不漏掉、不混淆任何新代码和旧缓存
      - name: Build debug APK
        run: |
          chmod +x gradlew
          if [ -n "${{ github.event.inputs.abi }}" ]; then
            ./gradlew clean :app:assembleDebug -PtargetAbi=${{ github.event.inputs.abi }}
          else
            ./gradlew clean :app:assembleDebug
          fi

      # 采用轰炸式全局搜索，彻底解决多模块项目下 APK 路径奇葩的问题
      - name: Locate and stage APK
        run: |
          mkdir -p apk-output
          
          echo "==== 正在全局搜索生成的 APK 文件 ===="
          find . -name "*.apk" -type f
          
          echo "==== 开始复制所有生成的 APK 到输出目录 ===="
          find . -name "*.apk" -type f -exec cp {} apk-output/ \;
          
          if [ -z "$(ls -A apk-output)" ]; then
            echo "❌ 错误：全局未找到任何生成的 APK 文件，请检查编译日志是否成功产出。"
            exit 1
          else
            echo "✅ 成功捞到以下 APK 并准备上传："
            ls -l apk-output/
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilitv-native-apk-${{ github.sha }}
          path: apk-output/*.apk
          if-no-files-found: error
