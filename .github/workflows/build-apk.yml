name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      abi:
        description: 'Target ABI (armeabi-v7a, arm64-v8a, or empty for both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - arm64-v8a
          - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 1. 编译前先 clean，彻底干掉旧的、冲突的遗留 APK 缓存
      - name: Build debug APK
        run: |
          chmod +x gradlew
          if [ -n "${{ github.event.inputs.abi }}" ]; then
            ./gradlew clean :app:assembleDebug -PtargetAbi=${{ github.event.inputs.abi }}
          else
            ./gradlew clean :app:assembleDebug
          fi

      # 2. 精准复制：Android 标准的 Debug APK 输出路径就是 app/build/outputs/apk/debug/
      - name: Locate and stage APK
        run: |
          mkdir -p apk-output
          if [ -d "app/build/outputs/apk/debug" ]; then
            cp app/build/outputs/apk/debug/*.apk apk-output/
          else
            # 兜底逻辑：如果模块名不叫 app，再用安全路径查找
            apk=$(find . -name "*debug*.apk" -path "*/outputs/apk/*" 2>/dev/null | head -1)
            if [ -n "$apk" ]; then
              cp "$apk" apk-output/
            else
              echo "Standard Debug APK not found"
              exit 1
            fi
          fi
          echo "APK staged: $(ls apk-output/)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bilitv-native-apk-${{ github.sha }}
          path: apk-output/*.apk
          if-no-files-found: error
